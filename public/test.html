<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Headai MCP Test Tool</title>
<link rel="icon" type="image/svg+xml" href="/favicon.svg">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Inter', system-ui, sans-serif; background: #0d1117; color: #c9d1d9; min-height: 100vh; }
.header { padding: 24px 32px; border-bottom: 1px solid #21262d; display: flex; align-items: center; gap: 16px; }
.header h1 { font-size: 20px; font-weight: 600; color: #f0f6fc; }
.header .badge { background: #238636; color: #fff; padding: 2px 10px; border-radius: 12px; font-size: 12px; }
.config { padding: 16px 32px; background: #161b22; border-bottom: 1px solid #21262d; display: flex; gap: 12px; align-items: center; flex-wrap: wrap; }
.config input { background: #0d1117; border: 1px solid #30363d; color: #c9d1d9; padding: 8px 12px; border-radius: 6px; font-size: 14px; }
.config input.key { width: 320px; }
.config button { padding: 8px 20px; border-radius: 6px; border: none; font-size: 14px; font-weight: 500; cursor: pointer; }
.btn-run { background: #238636; color: #fff; }
.btn-run:hover { background: #2ea043; }
.btn-run:disabled { background: #21262d; color: #484f58; cursor: not-allowed; }
.btn-stop { background: #da3633; color: #fff; }
.btn-download { background: #1f6feb; color: #fff; }
.btn-download:hover { background: #388bfd; }
.btn-download:disabled { background: #21262d; color: #484f58; cursor: not-allowed; }
.stats { padding: 12px 32px; display: flex; gap: 24px; font-size: 13px; color: #8b949e; border-bottom: 1px solid #21262d; }
.stats .num { color: #f0f6fc; font-weight: 600; font-size: 15px; }
.stats .pass { color: #3fb950; }
.stats .fail { color: #f85149; }
.stats .skip { color: #d29922; }
.results { padding: 16px 32px; }
.section { margin-bottom: 24px; }
.section h2 { font-size: 14px; font-weight: 600; color: #8b949e; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 8px; }
.test { display: flex; align-items: flex-start; gap: 10px; padding: 8px 12px; border-radius: 6px; margin-bottom: 4px; font-size: 13px; transition: background 0.2s; }
.test:hover { background: #161b22; }
.test .icon { width: 20px; text-align: center; flex-shrink: 0; font-size: 14px; }
.test .name { flex: 1; color: #c9d1d9; }
.test .time { color: #8b949e; font-size: 12px; min-width: 60px; text-align: right; }
.test .detail { color: #8b949e; font-size: 11px; margin-top: 2px; }
.test.pass .icon { color: #3fb950; }
.test.fail .icon { color: #f85149; }
.test.skip .icon { color: #d29922; }
.test.running .icon { color: #58a6ff; }
.test.pending .icon { color: #484f58; }
.progress { height: 3px; background: #21262d; margin: 0; }
.progress-bar { height: 100%; background: #238636; transition: width 0.3s; }
.log { background: #161b22; border: 1px solid #21262d; border-radius: 6px; padding: 12px; margin-top: 8px; font-family: monospace; font-size: 11px; max-height: 200px; overflow-y: auto; white-space: pre-wrap; word-break: break-all; display: none; color: #8b949e; }
.test.fail .log { display: block; }
.checkbox-label { font-size: 12px; color: #8b949e; display: flex; align-items: center; gap: 4px; }
</style>
</head>
<body>
<div class="header">
  <h1>&#9670; Headai MCP Test Tool</h1>
  <span class="badge" id="version">v1.5.0</span>
</div>

<div class="config">
  <input class="key" id="apiKey" type="password" placeholder="Headai API Key">
  <button class="btn-run" id="runBtn" onclick="runAllTests()">Run All Tests</button>
  <button class="btn-stop" id="stopBtn" onclick="stopTests()" style="display:none">Stop</button>
  <button class="btn-download" id="downloadBtn" onclick="downloadReport()" disabled>Download Report</button>
  <label class="checkbox-label"><input type="checkbox" id="skipSlow" checked> Skip slow tests (builds)</label>
</div>

<div class="progress"><div class="progress-bar" id="progressBar" style="width:0%"></div></div>

<div class="stats">
  <div>Total: <span class="num" id="statTotal">0</span></div>
  <div>Passed: <span class="num pass" id="statPass">0</span></div>
  <div>Failed: <span class="num fail" id="statFail">0</span></div>
  <div>Skipped: <span class="num skip" id="statSkip">0</span></div>
  <div>Time: <span class="num" id="statTime">0s</span></div>
</div>

<div class="results" id="results"></div>

<script>
let stopped = false;
let stats = { total: 0, pass: 0, fail: 0, skip: 0 };
const startedAt = { time: 0 };
const testResults = [];

// ── Report data collection ──
function recordResult(section, name, status, timeMs, detail) {
  testResults.push({
    section,
    name,
    status,
    timeMs: timeMs || 0,
    detail: detail || '',
    timestamp: new Date().toISOString()
  });
}

function downloadReport() {
  const report = {
    tool: 'Headai MCP Test Tool',
    version: 'v1.5.0',
    server: window.location.origin,
    runDate: new Date().toISOString(),
    summary: {
      total: stats.total,
      passed: stats.pass,
      failed: stats.fail,
      skipped: stats.skip,
      durationMs: Date.now() - startedAt.time,
      slowTestsSkipped: document.getElementById('skipSlow').checked
    },
    tests: testResults
  };

  const blob = new Blob([JSON.stringify(report, null, 2)], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = 'headai-mcp-test-' + new Date().toISOString().slice(0, 10) + '.json';
  a.click();
  URL.revokeObjectURL(url);
}

// ── REST helpers ──
async function httpGet(url, timeout) {
  timeout = timeout || 10000;
  const controller = new AbortController();
  const timer = setTimeout(function() { controller.abort(); }, timeout);
  try {
    const res = await fetch(url, { signal: controller.signal });
    clearTimeout(timer);
    return { status: res.status, data: await res.json().catch(function() { return null; }), headers: Object.fromEntries(res.headers) };
  } catch (e) {
    clearTimeout(timer);
    throw e;
  }
}

async function httpOptions(url, origin) {
  const res = await fetch(url, {
    method: 'OPTIONS',
    headers: {
      'Origin': origin,
      'Access-Control-Request-Method': 'POST',
      'Access-Control-Request-Headers': 'Content-Type, Authorization, mcp-session-id',
    }
  });
  return {
    status: res.status,
    allowOrigin: res.headers.get('access-control-allow-origin'),
    allowMethods: res.headers.get('access-control-allow-methods'),
    allowHeaders: res.headers.get('access-control-allow-headers'),
    allowCredentials: res.headers.get('access-control-allow-credentials'),
    maxAge: res.headers.get('access-control-max-age'),
  };
}

// ── SSE/JSON response parser ──
function parseResponse(text) {
  if (text.startsWith('event:') || text.indexOf('\ndata:') > -1 || text.startsWith('data:')) {
    var lines = text.split('\n').filter(function(l) { return l.startsWith('data:'); });
    if (lines.length === 0) return { result: { content: [{ type: 'text', text: 'Empty SSE' }] } };
    var lastLine = lines[lines.length - 1];
    return JSON.parse(lastLine.replace(/^data:\s*/, ''));
  }
  return JSON.parse(text);
}

// ── Test runner UI ──
function addSection(title) {
  var div = document.createElement('div');
  div.className = 'section';
  div.innerHTML = '<h2>' + title + '</h2>';
  document.getElementById('results').appendChild(div);
  return div;
}

function addTest(section, name) {
  var div = document.createElement('div');
  div.className = 'test pending';
  div.innerHTML = '<span class="icon">&#9675;</span><span class="name">' + name + '</span><span class="time"></span><div class="log"></div>';
  section.appendChild(div);
  return div;
}

function setTestResult(el, status, time, detail) {
  el.className = 'test ' + status;
  var icons = { pass: '✓', fail: '✗', skip: '⊘', running: '⟳' };
  el.querySelector('.icon').textContent = icons[status] || '○';
  if (time !== undefined) el.querySelector('.time').textContent = time + 'ms';
  if (detail) el.querySelector('.log').textContent = detail;
  if (status !== 'running') {
    stats[status]++;
    stats.total++;
  }
  updateStats();
}

function updateStats() {
  document.getElementById('statTotal').textContent = stats.total;
  document.getElementById('statPass').textContent = stats.pass;
  document.getElementById('statFail').textContent = stats.fail;
  document.getElementById('statSkip').textContent = stats.skip;
  var elapsed = ((Date.now() - startedAt.time) / 1000).toFixed(1);
  document.getElementById('statTime').textContent = elapsed + 's';
  var done = stats.pass + stats.fail + stats.skip;
  var pct = stats.total > 0 ? (done / stats.total * 100) : 0;
  document.getElementById('progressBar').style.width = pct + '%';
}

var currentSection = '';
async function runTest(section, sectionName, name, fn, slow) {
  if (stopped) return;
  if (slow && document.getElementById('skipSlow').checked) {
    var el = addTest(section, name);
    setTestResult(el, 'skip', undefined, 'Skipped (slow test)');
    recordResult(sectionName, name, 'skip', 0, 'Skipped (slow test)');
    return;
  }
  var el = addTest(section, name);
  setTestResult(el, 'running');
  var t0 = Date.now();
  try {
    var result = await fn();
    var elapsed = Date.now() - t0;
    setTestResult(el, 'pass', elapsed, typeof result === 'string' ? result : '');
    recordResult(sectionName, name, 'pass', elapsed, typeof result === 'string' ? result : '');
  } catch (e) {
    var elapsed = Date.now() - t0;
    var msg = e.message || String(e);
    setTestResult(el, 'fail', elapsed, msg);
    recordResult(sectionName, name, 'fail', elapsed, msg);
  }
}

function stopTests() {
  stopped = true;
  document.getElementById('runBtn').style.display = '';
  document.getElementById('stopBtn').style.display = 'none';
  document.getElementById('downloadBtn').disabled = false;
}

async function runAllTests() {
  stopped = false;
  stats = { total: 0, pass: 0, fail: 0, skip: 0 };
  testResults.length = 0;
  startedAt.time = Date.now();
  document.getElementById('results').innerHTML = '';
  document.getElementById('runBtn').style.display = 'none';
  document.getElementById('stopBtn').style.display = '';
  document.getElementById('downloadBtn').disabled = true;
  document.getElementById('progressBar').style.width = '0%';

  var url = '';
  var key = document.getElementById('apiKey').value;

  if (!key) {
    alert('Enter your Headai API key');
    stopTests();
    return;
  }

  // ── 1. Connectivity ──
  var s1 = addSection('Connectivity');

  await runTest(s1, 'Connectivity', 'Health endpoint', async function() {
    var r = await httpGet(url + '/health');
    if (r.status !== 200) throw new Error('HTTP ' + r.status);
    return 'OK';
  });

  await runTest(s1, 'Connectivity', 'Tools endpoint (REST)', async function() {
    var r = await httpGet(url + '/tools');
    if (r.status !== 200) throw new Error('HTTP ' + r.status);
    var count = (r.data && r.data.tools) ? r.data.tools.length : 0;
    if (count < 20) throw new Error('Only ' + count + ' tools (expected 20+)');
    return count + ' tools listed';
  });

  await runTest(s1, 'Connectivity', 'Docs endpoint', async function() {
    var r = await fetch(url + '/docs');
    if (r.status !== 200) throw new Error('HTTP ' + r.status);
    return 'OK';
  });

  await runTest(s1, 'Connectivity', 'Changelog endpoint', async function() {
    var r = await httpGet(url + '/changelog');
    if (r.status !== 200) throw new Error('HTTP ' + r.status);
    var count = (r.data && r.data.changelog) ? r.data.changelog.length : 0;
    return count + ' versions';
  });

  // ── 2. CORS ──
  var s2 = addSection('CORS (Browser Compatibility)');
  var origins = ['http://localhost:6274', 'https://claude.ai', 'https://chatgpt.com', 'https://headai.dev'];

  // Use the server-side /test/cors endpoint that performs the OPTIONS internally.
  // Browser fetch() cannot set custom Origin headers, making client-side preflight tests unreliable.
  for (var i = 0; i < origins.length; i++) {
    var origin = origins[i];
    await runTest(s2, 'CORS', 'Preflight: ' + origin, (function(o) {
      return async function() {
        var resp = await fetch('/test/cors?origin=' + encodeURIComponent(o));
        var r = await resp.json();
        if (r.error) throw new Error(r.error);
        if (!r.allowOrigin) throw new Error('No Access-Control-Allow-Origin');
        if (!r.allowCredentials) throw new Error('No Access-Control-Allow-Credentials');
        var ah = r.allowHeaders || '';
        if (ah.indexOf('authorization') === -1 && ah.indexOf('Authorization') === -1) throw new Error('Authorization not in allowed headers');
        return 'Origin: ' + r.allowOrigin + ', MaxAge: ' + (r.maxAge || 'n/a');
      };
    })(origin));
  }

  // ── 3. MCP Protocol ──
  var s3 = addSection('MCP Protocol');
  var sessionId = null;
  var mcpHeaders = {
    'Content-Type': 'application/json',
    'Accept': 'application/json, text/event-stream',
    'Authorization': 'Bearer ' + key,
  };

  await runTest(s3, 'MCP Protocol', 'Initialize session', async function() {
    var res = await fetch(url + '/mcp', {
      method: 'POST',
      headers: mcpHeaders,
      body: JSON.stringify({
        jsonrpc: '2.0', id: '1', method: 'initialize',
        params: { protocolVersion: '2025-03-26', capabilities: {}, clientInfo: { name: 'headai-test-tool', version: '1.0.0' } }
      }),
    });
    sessionId = res.headers.get('mcp-session-id');
    if (!sessionId) throw new Error('No mcp-session-id header');
    var text = await res.text();
    var data = parseResponse(text);
    if (data.error) throw new Error(data.error.message);
    return 'Session: ' + sessionId.slice(0, 8) + '...';
  });

  await runTest(s3, 'MCP Protocol', 'List tools via MCP', async function() {
    if (!sessionId) throw new Error('No session');
    var callHeaders = Object.assign({}, mcpHeaders, { 'mcp-session-id': sessionId });
    var res = await fetch(url + '/mcp', {
      method: 'POST', headers: callHeaders,
      body: JSON.stringify({ jsonrpc: '2.0', id: '2', method: 'tools/list', params: {} }),
    });
    var data = parseResponse(await res.text());
    var tools = (data.result && data.result.tools) ? data.result.tools : [];
    if (tools.length < 20) throw new Error('Only ' + tools.length + ' tools');

    var names = tools.map(function(t) { return t.name; });
    var required = ['headai_build_knowledge_graph_v2', 'headai_scorecard_v2', 'headai_text_to_graph', 'headai_check_build_status', 'headai_get_playbook'];
    var missing = required.filter(function(r) { return names.indexOf(r) === -1; });
    if (missing.length) throw new Error('Missing: ' + missing.join(', '));

    var v1leaks = names.filter(function(n) { return n === 'headai_build_knowledge_graph' || n === 'headai_scorecard'; });
    if (v1leaks.length) throw new Error('V1 tools found: ' + v1leaks.join(', '));

    // Check annotations on write tools
    var writeTools = ['headai_build_knowledge_graph_v2', 'headai_scorecard_v2', 'headai_build_signals'];
    var badAnnotations = [];
    for (var j = 0; j < tools.length; j++) {
      if (writeTools.indexOf(tools[j].name) > -1 && tools[j].annotations && tools[j].annotations.readOnlyHint === true) {
        badAnnotations.push(tools[j].name);
      }
    }
    if (badAnnotations.length) throw new Error('Write tools with readOnlyHint=true: ' + badAnnotations.join(', '));

    return tools.length + ' tools, all v2, no v1 leaks, annotations OK';
  });

  // ── 4. Tool call helper ──
  async function callTool(name, args, timeout) {
    timeout = timeout || 60000;
    if (!sessionId) throw new Error('No session');
    var callHeaders = Object.assign({}, mcpHeaders, { 'mcp-session-id': sessionId });
    var res = await fetch(url + '/mcp', {
      method: 'POST', headers: callHeaders,
      body: JSON.stringify({
        jsonrpc: '2.0', id: crypto.randomUUID(), method: 'tools/call',
        params: { name: name, arguments: args },
      }),
      signal: AbortSignal.timeout(timeout),
    });
    var data = parseResponse(await res.text());
    if (data.error) throw new Error(data.error.message);
    var content = (data.result && data.result.content && data.result.content[0]) ? data.result.content[0].text : '';
    try {
      return JSON.parse(content);
    } catch (e) {
      // Non-JSON response (e.g. playbook returns markdown, analyst returns text)
      return { _json: false, _raw_text: content };
    }
  }

  // ── 5. Read-only tools ──
  var s4 = addSection('Read-Only Tools');

  await runTest(s4, 'Read-Only Tools', 'get_playbook', async function() {
    var r = await callTool('headai_get_playbook', {});
    if (!r) throw new Error('Empty response');
    // Playbook returns markdown text, not JSON
    if (r._json === false) return 'Playbook loaded (' + r._raw_text.length + ' chars, markdown)';
    return 'Playbook loaded (' + JSON.stringify(r).length + ' chars)';
  });

  await runTest(s4, 'Read-Only Tools', 'list_token_endpoints', async function() {
    var r = await callTool('headai_list_token_endpoints', {});
    if (!r) throw new Error('Empty response');
    var endpoints = Array.isArray(r) ? r : (r.endpoints || []);
    return endpoints.length + ' endpoints';
  });

  await runTest(s4, 'Read-Only Tools', 'list_token_data (BKG v2, limit 3)', async function() {
    var r = await callTool('headai_list_token_data', { endpoint: 'BuildKnowledgeGraph_v2', limit: 3 });
    if (r.total === undefined) throw new Error('No total field');
    return r.total + ' total graphs, returned ' + r.returned;
  });

  await runTest(s4, 'Read-Only Tools', 'list_token_data (Scorecard v2)', async function() {
    var r = await callTool('headai_list_token_data', { endpoint: 'Scorecard_v2', limit: 3 });
    // Handle non-JSON fallback from control char sanitization or truncation
    if (r._json === false) {
      if (r._raw_text && r._raw_text.indexOf('total') > -1) return 'Parsed as text (' + r._raw_text.length + ' chars)';
      return 'Response received (non-JSON, ' + (r._raw_text || '').length + ' chars)';
    }
    if (r.total === undefined) throw new Error('No total field');
    return r.total + ' total scorecards, returned ' + r.returned;
  });

  await runTest(s4, 'Read-Only Tools', 'list_token_data (TextToGraph)', async function() {
    var r = await callTool('headai_list_token_data', { endpoint: 'TextToGraph', limit: 3 });
    if (r.total === undefined) throw new Error('No total field');
    return r.total + ' total graphs, returned ' + r.returned;
  });

  // ── 6. Data Availability — estimate_size per dataset ──
  var s5 = addSection('Data Availability (estimate_size)');

  var datasets = [
    { dataset: 'job_ads', search_text: 'software', language: 'en', label: 'job_ads EN (global)' },
    { dataset: 'job_ads', search_text: 'ohjelmisto', language: 'fi', country: 'fi', label: 'job_ads FI (country:fi)' },
    { dataset: 'job_ads', search_text: 'software', language: 'fi', city: 'Helsinki', label: 'job_ads Helsinki' },
    { dataset: 'job_ads', search_text: 'software', language: 'fi', city: 'Tampere', label: 'job_ads Tampere' },
    { dataset: 'job_ads', search_text: 'software', language: 'fi', city: 'Turku', label: 'job_ads Turku' },
    { dataset: 'job_ads', search_text: 'software', language: 'en', city: 'Amsterdam', label: 'job_ads Amsterdam (NL)' },
    { dataset: 'curriculum', search_text: 'tietotekniikka', language: 'fi', label: 'curriculum FI (national)' },
    { dataset: 'curriculum', search_text: 'tietotekniikka', language: 'fi', city: 'Helsinki', label: 'curriculum Helsinki' },
    { dataset: 'curriculum', search_text: 'computer science', language: 'en', label: 'curriculum EN' },
    { dataset: 'doaj', search_text: 'machine learning', language: 'en', search_year: 2025, label: 'doaj EN 2025' },
    { dataset: 'news', search_text: 'artificial intelligence', language: 'en', search_year: 2025, label: 'news EN 2025' },
    { dataset: 'news', search_text: 'tekoaly', language: 'fi', search_year: 2025, label: 'news FI 2025' },
    { dataset: 'theseus', search_text: 'data science', language: 'fi', search_year: 2024, label: 'theseus FI 2024' },
    { dataset: 'investments', search_text: 'artificial intelligence', language: 'en', search_year: 2025, label: 'investments EN 2025' },
  ];

  for (var d = 0; d < datasets.length; d++) {
    var ds = datasets[d];
    var dsLabel = ds.label;
    var dsArgs = Object.assign({}, ds);
    delete dsArgs.label;
    await runTest(s5, 'Data Availability', dsLabel, (function(args, lbl) {
      return async function() {
        var r = await callTool('headai_estimate_size', args);
        // Non-JSON response (some datasets return text or markdown)
        if (r._json === false) return 'Response received (non-JSON, ' + (r._raw_text || '').length + ' chars)';
        // Some datasets return 'estimate' instead of 'total_results' (e.g. news)
        var count = r.total_results !== undefined ? r.total_results : r.estimate;
        if (count === undefined) throw new Error('No total_results or estimate field');
        // News dataset returns -1 (pre-estimation unavailable) — accept it as valid
        if (count === -1) return '-1 (pre-estimation unavailable — OK)';
        if (count === 0) throw new Error('0 results — data missing or filter broken');
        return count.toLocaleString() + ' records';
      };
    })(dsArgs, dsLabel));
  }

  // ── 7. TextToGraph ──
  var s6 = addSection('TextToGraph');

  await runTest(s6, 'TextToGraph', 'Small text returns graph_url', async function() {
    var r = await callTool('headai_text_to_graph', {
      text: 'Python, machine learning, data science, TensorFlow, PyTorch, NLP',
      language: 'en',
      legend: 'MCP Test',
    }, 60000);
    if (!r.graph_url && !r.status) throw new Error('No graph_url: ' + JSON.stringify(r).slice(0, 200));
    return r.graph_url ? 'URL: ...' + r.graph_url.slice(-40) : 'Status: ' + r.status;
  });

  // ── 8. Scorecard v2 ──
  var s7 = addSection('Scorecard v2');

  await runTest(s7, 'Scorecard v2', 'Two BKG v2 graphs', async function() {
    var r = await callTool('headai_scorecard_v2', {
      graph_1: 'https://megatron.headai.com/analysis/BuildKnowledgeGraph_v2/BuildKnowledgeGraph_v2_N1gvOw0Xg21780313834336.json',
      graph_2: 'https://megatron.headai.com/analysis/BuildKnowledgeGraph_v2/BuildKnowledgeGraph_v2_ky37ADQkVX1780313865709.json',
      legend_1: 'Graph A', legend_2: 'Graph B',
    }, 120000);
    if (r._json === false) return 'Scorecard response (' + r._raw_text.length + ' chars, text — truncated)';
    if (r.status === 'error') throw new Error(r.message || 'Scorecard error');
    return 'Status: ' + r.status;
  });

  await runTest(s7, 'Scorecard v2', 'TextToGraph vs BKG v2 (cross-type)', async function() {
    var r = await callTool('headai_scorecard_v2', {
      graph_1: 'https://megatron.headai.com/analysis/TextToGraph/TextToGraph_ysAGkaCkhA1780928333838.json',
      graph_2: 'https://megatron.headai.com/analysis/BuildKnowledgeGraph_v2/BuildKnowledgeGraph_v2_rpyo0g5Dxe1780770685243.json',
      legend_1: 'TextToGraph', legend_2: 'BKG v2',
    }, 120000);
    if (r._json === false) return 'Scorecard response (' + r._raw_text.length + ' chars, text — truncated)';
    if (r.status === 'error') throw new Error(r.message || 'Scorecard error');
    if (r.status === 'unknown') throw new Error('Polling bug: ' + (r.raw_status || 'unknown'));
    return 'Status: ' + r.status;
  });

  // ── 9. Build tests (slow, skipped by default) ──
  var s8 = addSection('Build Tests (slow — skipped by default)');

  await runTest(s8, 'Builds', 'BKG v2: job_ads + city Helsinki', async function() {
    var r = await callTool('headai_build_knowledge_graph_v2', {
      dataset: 'job_ads', search_text: 'python, data science, machine learning',
      city: 'Helsinki', language: 'en', size: 50, auto_confirm: true,
    }, 180000);
    if (r.status === 'error' || r.status === 'blocked') throw new Error(r.message || 'Build failed');
    return 'Status: ' + r.status + ', graph: ' + ((r.graph_url || '').slice(-40));
  }, true);

  await runTest(s8, 'Builds', 'BKG v2: curriculum + city (regression)', async function() {
    var r = await callTool('headai_build_knowledge_graph_v2', {
      dataset: 'curriculum', search_text: 'tietotekniikka, ohjelmointi',
      city: 'Helsinki', language: 'fi', size: 50, auto_confirm: true,
    }, 180000);
    if (r.status === 'error' && r.message && r.message.indexOf('city') > -1) throw new Error('City filter broken: ' + r.message);
    return 'Status: ' + r.status;
  }, true);

  // ── 10. Graph Quality & Cleaning ──
  var s9 = addSection('Graph Quality & Cleaning');
  var testGraphUrl = 'https://megatron.headai.com/analysis/BuildKnowledgeGraph_v2/BuildKnowledgeGraph_v2_N1gvOw0Xg21780313834336.json';

  await runTest(s9, 'Quality', 'Quality check (native)', async function() {
    var r = await callTool('headai_quality_check', { graph_url: testGraphUrl }, 60000);
    if (!r) throw new Error('Empty response');
    if (r.quality_score === undefined) throw new Error('No quality_score in response');
    if (typeof r.quality_score !== 'number') throw new Error('quality_score not a number: ' + typeof r.quality_score);
    if (r.quality_score < 0 || r.quality_score > 100) throw new Error('quality_score out of range: ' + r.quality_score);
    if (!r.metrics) throw new Error('No metrics in response');
    if (!r.verdict) throw new Error('No verdict in response');
    return 'Score: ' + r.quality_score + '/100 — ' + r.verdict;
  });

  await runTest(s9, 'Quality', 'Clean graph (normal)', async function() {
    var r = await callTool('headai_clean_graph', { graph_url: testGraphUrl, aggressiveness: 'normal' }, 120000);
    if (!r) throw new Error('Empty response');
    // Either returns cleaned graph or "already_clean"
    if (r.status === 'already_clean') return 'Graph already clean at normal threshold';
    if (!r.graph_url && !r.cleaning_summary) throw new Error('No graph_url or cleaning_summary in response');
    var summary = r.cleaning_summary || {};
    return 'Removed ' + (summary.noise_removed || 0) + ' noise nodes, ' + (summary.remaining_nodes || '?') + ' remaining';
  }, true);

  // ── 11. Advanced Analyst (legacy, opt-in) ──
  var s10 = addSection('Advanced Analyst (legacy)');

  await runTest(s10, 'Analyst', 'Hub detection', async function() {
    var r = await callTool('headai_run_analyst', { url: testGraphUrl, report: 1 }, 60000);
    if (!r) throw new Error('Empty response');
    if (r._json === false) return 'Analyst response (' + r._raw_text.length + ' chars, text)';
    return JSON.stringify(r).length + ' chars';
  });

  await runTest(s10, 'Analyst', 'Quality assessment', async function() {
    var r = await callTool('headai_run_analyst', { url: testGraphUrl, report: 198 }, 60000);
    if (!r) throw new Error('Empty response');
    if (r._json === false) return 'Analyst response (' + r._raw_text.length + ' chars, text)';
    return JSON.stringify(r).length + ' chars';
  });

  // ── Done ──
  stopTests();
  document.getElementById('progressBar').style.width = '100%';
  document.getElementById('progressBar').style.background = stats.fail > 0 ? '#f85149' : '#238636';
}
</script>
</body>
</html>
